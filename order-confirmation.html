<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmation - PRIEST</title>
    <link rel="icon" type="Logo" href="img/logo.jpeg">
    <link rel="stylesheet" href="styles.css">
    <style>
        .confirmation-container {
            padding: 3rem 0;
            min-height: 60vh;
        }
        .confirmation-card {
            max-width: 48rem;
            margin: 0 auto;
            background-color: var(--white);
            border: 1px solid var(--gray-200);
            padding: 2rem;
        }
        .success-icon {
            width: 64px;
            height: 64px;
            color: var(--green-600);
            margin: 0 auto 1.5rem;
        }
        .confirmation-title {
            font-size: 2rem;
            text-align: center;
            margin-bottom: 1rem;
        }
        .confirmation-message {
            text-align: center;
            color: var(--gray-600);
            margin-bottom: 2rem;
        }
        .order-details {
            border-top: 1px solid var(--gray-200);
            padding-top: 2rem;
            margin-top: 2rem;
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .order-id {
            font-size: 1.125rem;
            font-weight: 600;
        }
        .order-date {
            color: var(--gray-600);
        }
        .customer-info {
            background-color: var(--gray-50);
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        .info-row {
            display: flex;
            margin-bottom: 0.5rem;
        }
        .info-label {
            width: 120px;
            font-weight: 500;
            color: var(--gray-600);
        }
        .info-value {
            flex: 1;
        }
        .items-title {
            font-size: 1.25rem;
            margin-bottom: 1rem;
        }
        .order-items {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .order-item {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            border: 1px solid var(--gray-200);
        }
        .order-item-image {
            width: 80px;
            height: 80px;
            object-fit: cover;
            background-color: var(--gray-100);
        }
        .order-item-details {
            flex: 1;
        }
        .order-item-name {
            font-weight: 500;
            margin-bottom: 0.25rem;
        }
        .order-item-meta {
            font-size: 0.875rem;
            color: var(--gray-600);
        }
        .order-item-price {
            font-weight: 500;
            text-align: right;
        }
        .totals {
            border-top: 1px solid var(--gray-300);
            padding-top: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            align-items: flex-end;
        }
        .total-row {
            display: flex;
            gap: 2rem;
        }
        .total-row.grand-total {
            font-size: 1.125rem;
            font-weight: 600;
            border-top: 1px solid var(--gray-300);
            padding-top: 0.5rem;
        }
        .actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 3rem;
        }
        .btn-outline {
            border: 2px solid var(--black);
            background: transparent;
            color: var(--black);
        }
        .btn-outline:hover {
            background: var(--black);
            color: var(--white);
        }
        @media (max-width: 640px) {
            .order-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }
            .info-row {
                flex-direction: column;
            }
            .info-label {
                width: auto;
            }
            .actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <nav class="nav-container">
            <div class="nav-content">
                <a href="index.html" class="logo">PRIEST</a>
                <div class="nav-links" id="navLinks">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="shop.html" class="nav-link">Shop</a>
                    <a href="about.html" class="nav-link">About</a>
                </div>
                <div class="nav-actions">
                    <div class="user-menu" id="userMenu">
                        <button class="user-button" id="userButton">Login</button>
                        <div class="user-dropdown" id="userDropdown"></div>
                    </div>
                    <a href="cart.html" class="cart-link">
                        <svg class="cart-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 2L7.17 4H3a1 1 0 00-1 1v12a1 1 0 001 1h18a1 1 0 001-1V5a1 1 0 00-1-1h-4.17L15 2H9z"/>
                            <path d="M9 17v-6M15 17v-6"/>
                        </svg>
                        <span class="cart-count" id="cartCount">0</span>
                    </a>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="container confirmation-container">
            <div class="confirmation-card" id="confirmationCard">
                <!-- Content filled by JavaScript -->
                <div class="spinner" id="loadingSpinner"></div>
                <div id="orderContent" style="display: none;"></div>
                <div id="errorMessage" class="empty-state" style="display: none;">
                    <svg class="empty-state-icon" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                    <h2 class="empty-state-title">Order not found</h2>
                    <p class="empty-state-text">We couldn't find your order details.</p>
                    <a href="shop.html" class="btn btn-primary">Continue Shopping</a>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                © 2026 Priest. All rights reserved.
            </div>
        </div>
    </footer>
        <!-- Mobile Bottom Navigation (visible only on small screens) -->
<nav class="bottom-nav-mobile">
  <div class="nav-items">
    <a href="index.html" class="nav-item">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 10L12 3L21 10V20H15V14H9V20H3V10Z" />
      </svg>
      <span>Home</span>

     <a href="shop.html" class="nav-item">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

        <path d="M12 16v-4M12 8h.01"/>
      </svg>
      <span>Shop</span>
    </a>
    <a href="cart.html" class="nav-item">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 2L7.17 4H3a1 1 0 00-1 1v12a1 1 0 001 1h18a1 1 0 001-1V5a1 1 0 00-1-1h-4.17L15 2H9z"/>
        <path d="M9 17v-6M15 17v-6"/>
      </svg>
      <span>Cart</span>
      <span class="cart-count" id="mobileCartCount">0</span>

    <a href="about.html" class="nav-item">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

        <path d="M12 16v-4M12 8h.01"/>
      </svg>
      <span>About</span>
    </a>
   
  </div>
</nav>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

</body>
</html>
