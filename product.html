<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product - PRIEST</title>
        <link rel="icon" type="Logo" href="img/logo.jpeg">
    <link rel="stylesheet" href="styles.css">
    <style>
        .product-container {
            padding: 3rem 0;
            min-height: 60vh;
        }
        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
            color: var(--gray-700);
            transition: opacity 0.3s;
        }
        .back-button:hover {
            opacity: 0.7;
        }
        .product-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
        }
        .product-image-container {
            aspect-ratio: 2;
            background-color: var(--gray-100);
        }
        .product-image-large {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .product-info {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .product-category {
            font-size: 0.875rem;
            color: var(--gray-500);
            margin-bottom: 0.5rem;
        }
        .product-title {
            font-size: 2.25rem;
            margin-bottom: 1rem;
            letter-spacing: 0.05em;
        }
        .product-price-large {
            font-size: 1.5rem;
        }
        .product-description {
            color: var(--gray-600);
            line-height: 1.8;
        }
        .size-selector {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .size-selector label {
            display: block;
            margin-bottom: 0.75rem;
        }
        .size-options {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }
        .size-button {
            padding: 0.75rem 1.5rem;
            border: 1px solid var(--gray-300);
            background: var(--white);
            cursor: pointer;
            transition: all 0.3s;
        }
        .size-button.selected {
            background-color: var(--black);
            color: var(--white);
            border-color: var(--black);
        }
        .size-button:hover {
            border-color: var(--black);
        }
        .add-to-cart-button {
            width: 100%;
            padding: 1rem;
            background-color: var(--black);
            color: var(--white);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: background-color 0.3s;
        }
        .add-to-cart-button:hover {
            background-color: var(--gray-800);
        }
        .product-details-section {
            border-top: 1px solid var(--gray-200);
            padding-top: 1.5rem;
        }
        .detail-section {
            margin-bottom: 1rem;
        }
        .detail-section h3 {
            margin-bottom: 0.5rem;
        }
        .detail-section ul {
            list-style: none;
            padding-left: 0;
        }
        .detail-section ul li {
            font-size: 0.875rem;
            color: var(--gray-600);
            margin-bottom: 0.25rem;
        }
        @media (max-width: 1024px) {
            .product-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <nav class="nav-container">
            <div class="nav-content">
                <a href="index.html" class="logo">PRIEST</a>
                
                <div class="nav-links" id="navLinks">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="shop.html" class="nav-link">Shop</a>
                    <a href="about.html" class="nav-link">About</a>
                </div>

                <div class="nav-actions">
                    <div class="user-menu" id="userMenu">
                        <button class="user-button" id="userButton">Login</button>
                        <div class="user-dropdown" id="userDropdown"></div>
                    </div>
                    
                    <a href="cart.html" class="cart-link">
                        <svg class="cart-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 2L7.17 4H3a1 1 0 00-1 1v12a1 1 0 001 1h18a1 1 0 001-1V5a1 1 0 00-1-1h-4.17L15 2H9z"/>
                            <path d="M9 17v-6M15 17v-6"/>
                        </svg>
                        <span class="cart-count" id="cartCount">0</span>
                    </a>

                    <button class="mobile-menu-btn" id="mobileMenuBtn">
                        <span class="hamburger"></span>
                    </button>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="container product-container">
            <a href="shop.html" class="back-button">
                <svg width="20PX" height="20PX" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                Back
            </a>

            <div id="productDetail">
                <!-- Product loaded by JavaScript -->
            </div>

            <div id="notFound" class="empty-state" style="display: none;">
                <p class="empty-state-title">Product not found</p>
                <a href="shop.html" class="btn btn-primary">Return to Shop</a>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-grid">
                <div class="footer-col">
                    <h3 class="footer-title">PRIEST</h3>
                    <p class="footer-text">Premium graphic tees. Power rises in every street territory.</p>
                </div>
                <div class="footer-col">
                    <h4 class="footer-heading">Shop</h4>
                    <ul class="footer-links">
                        <li><a href="shop.html">All T-Shirts</a></li>
                    </ul>
                </div>
                <div class="footer-col">
                    <h4 class="footer-heading">Support</h4>
                    <ul class="footer-links">
                        <li><a href="#">Contact Us</a></li>
                    </ul>
                </div>
                <div class="footer-col">
                    <h4 class="footer-heading">Follow Us</h4>
                    <ul class="footer-links">
                        <li><a href="#">Instagram</a></li>
                    </ul>
                </div>
            </div>
            <div class="footer-bottom">
                © 2026 Priest. All rights reserved.
            </div>
        </div>
    </footer>
        <!-- Mobile Bottom Navigation (visible only on small screens) -->
<nav class="bottom-nav-mobile">
  <div class="nav-items">
    <a href="index.html" class="nav-item">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 10L12 3L21 10V20H15V14H9V20H3V10Z" />
      </svg>
      <span>Home</span>
    </a>
     <a href="shop.html" class="nav-item">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 16v-4M12 8h.01"/>
      </svg>
      <span>Shop</span>
    </a>
    <a href="cart.html" class="nav-item">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 2L7.17 4H3a1 1 0 00-1 1v12a1 1 0 001 1h18a1 1 0 001-1V5a1 1 0 00-1-1h-4.17L15 2H9z"/>
        <path d="M9 17v-6M15 17v-6"/>
      </svg>
      <span>Cart</span>
      <span class="cart-count" id="mobileCartCount">0</span>
    </a>
    <a href="about.html" class="nav-item">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 16v-4M12 8h.01"/>
      </svg>
      <span>About</span>
    </a>
   
  </div>
</nav>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
<script src="firebase-init.js"></script>   
<script src="app.js"></script>
<script src="products.js"></script>
<script src="product.js"></script>

</body>
</html>
