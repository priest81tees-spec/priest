<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - PRIEST</title>
  <link rel="icon" type="image/jpeg" href="img/logo.jpeg">
  <link rel="stylesheet" href="styles.css">
  <style>
    .signup-container { padding: 3rem 0; min-height: 60vh; display: flex; align-items: center; justify-content: center; }
    .signup-box { width: 100%; max-width: 28rem; }
    .signup-title { font-size: 2.5rem; text-align: center; margin-bottom: 2rem; letter-spacing: 0.05em; }
    .signup-form { background-color: var(--white); border: 1px solid var(--gray-200); padding: 2rem; }
    .signup-footer { margin-top: 1.5rem; text-align: center; font-size: 0.875rem; }
    .signup-footer a { color: var(--black); text-decoration: underline; }
    .signup-footer a:hover { text-decoration: none; }
  </style>
</head>
<body>
  <header class="header">
    <nav class="nav-container">
      <div class="nav-content">
        <a href="index.html" class="logo">PRIEST</a>
        <div class="nav-links" id="navLinks">
          <a href="index.html" class="nav-link">Home</a>
          <a href="shop.html" class="nav-link">Shop</a>
          <a href="about.html" class="nav-link">About</a>
        </div>
        <div class="nav-actions">
          <div class="user-menu" id="userMenu">
            <button class="user-button" id="userButton">Login</button>
            <div class="user-dropdown" id="userDropdown"></div>
          </div>
          <a href="cart.html" class="cart-link">
            <svg class="cart-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 2L7.17 4H3a1 1 0 00-1 1v12a1 1 0 001 1h18a1 1 0 001-1V5a1 1 0 00-1-1h-4.17L15 2H9z"/>
              <path d="M9 17v-6M15 17v-6"/>
            </svg>
            <span class="cart-count" id="cartCount">0</span>
          </a>
        </div>
      </div>
    </nav>
  </header>

  <main>
    <div class="container signup-container">
      <div class="signup-box">
        <h1 class="signup-title">Create Account</h1>
        <div class="signup-form">
          <form id="signupForm">
            <div class="form-group">
              <label class="form-label">Full Name</label>
              <input type="text" id="name" class="form-input" required>
            </div>
            <div class="form-group">
              <label class="form-label">Email Address</label>
              <input type="email" id="email" class="form-input" required>
            </div>
            <div class="form-group">
              <label class="form-label">Password</label>
              <div style="position: relative;">
                <input type="password" id="password" class="form-input" required style="padding-right: 2.5rem;">
                <button type="button" id="togglePassword" style="position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; padding: 0.25rem;">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                </button>
              </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;" id="signupButton">Sign Up</button>
          </form>
          <div class="signup-footer">
            <p>Already have an account? <a href="login.html">Log in</a></p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <nav class="bottom-nav-mobile">
    <div class="nav-items">
      <a href="index.html" class="nav-item">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 10L12 3L21 10V20H15V14H9V20H3V10Z" />
        </svg>
        <span>Home</span>
      </a>
      <a href="shop.html" class="nav-item">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 16v-4M12 8h.01"/>
        </svg>
        <span>Shop</span>
      </a>
      <a href="cart.html" class="nav-item">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 2L7.17 4H3a1 1 0 00-1 1v12a1 1 0 001 1h18a1 1 0 001-1V5a1 1 0 00-1-1h-4.17L15 2H9z"/>
          <path d="M9 17v-6M15 17v-6"/>
        </svg>
        <span>Cart</span>
        <span class="cart-count" id="mobileCartCount">0</span>
      </a>
      <a href="about.html" class="nav-item">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 16v-4M12 8h.01"/>
        </svg>
        <span>About</span>
      </a>
    </div>
  </nav>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase-init.js"></script>
  <script>
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const signupButton = document.getElementById('signupButton');

      signupButton.textContent = 'Creating account...';
      signupButton.disabled = true;

      try {
        // Create Firebase Auth user
        const userCredential = await firebase.auth().createUserWithEmailAndPassword(email, password);
        const user = userCredential.user;

        // Set display name
        await user.updateProfile({ displayName: name });

        // Save user document in Firestore (role = buyer)
        await db.collection('users').doc(user.uid).set({
          uid: user.uid,
          displayName: name,
          email: email,
          role: 'buyer',
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        // Redirect to home
        window.location.href = 'index.html';
      } catch (error) {
        // Use the global toast notification
        showNotification(error.message, 'error');
        signupButton.textContent = 'Sign Up';
        signupButton.disabled = false;
      }
    });

    // Toggle password visibility
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    togglePassword.addEventListener('click', function() {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
    });
  </script>
</body>
</html>
