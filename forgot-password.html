<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - PRIEST</title>
    <link rel="icon" type="Logo" href="img/logo.jpeg">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">...</header>   <!-- copy your existing header -->

    <main>
        <div class="container" style="padding: 3rem 0; min-height: 60vh; display: flex; align-items: center; justify-content: center;">
            <div style="max-width: 28rem; width: 100%;">
                <h1 class="checkout-title" style="text-align: center;">Reset Password</h1>
                <div style="background-color: var(--white); border: 1px solid var(--gray-200); padding: 2rem;">
                    <form id="forgotForm">
                        <div id="errorMessage" class="alert alert-error" style="display: none;"></div>
                        <div id="successMessage" class="alert alert-success" style="display: none;"></div>

                        <div class="form-group">
                            <label class="form-label">Email Address</label>
                            <input type="email" id="email" class="form-input" required>
                        </div>

                        <button type="submit" class="btn btn-primary" style="width: 100%;" id="resetButton">
                            Send Reset Email
                        </button>
                    </form>
                    <div style="margin-top: 1.5rem; text-align: center;">
                        <a href="login.html" style="font-size: 0.875rem;">Back to Login</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">...</footer>   <!-- copy your existing footer -->
    <!-- Mobile Bottom Navigation (visible only on small screens) -->
<nav class="bottom-nav-mobile">
  <div class="nav-items">

    <!-- Firebase SDKs (same as other pages) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
<script src="firebase-init.js"></script> 
<script src="app.js"></script> 
<script src="products.js"></script>

 
    <script>
        document.getElementById('forgotForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            const resetButton = document.getElementById('resetButton');

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            resetButton.textContent = 'Sending...';
            resetButton.disabled = true;

            firebase.auth().sendPasswordResetEmail(email)
                .then(() => {
                    successDiv.textContent = 'Password reset email sent! Check your inbox.';
                    successDiv.style.display = 'block';
                    resetButton.textContent = 'Send Reset Email';
                    resetButton.disabled = false;
                })
                .catch((error) => {
                    errorDiv.textContent = error.message;
                    errorDiv.style.display = 'block';
                    resetButton.textContent = 'Send Reset Email';
                    resetButton.disabled = false;
                });
        });
    </script>
</body>
</html>
